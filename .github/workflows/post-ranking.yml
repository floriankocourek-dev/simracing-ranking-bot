name: Post Ranking to Discord

# Manueller Start per Knopf (Actions-Tab -> "Run workflow").
# Spaeter optional: Zeitplan oder Auto-Trigger aus dem Sheet.
on:
  workflow_dispatch:

permissions:
  contents: write   # damit snapshot.json zurueckgeschrieben werden darf

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ranking nach Discord posten
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node post-ranking.mjs

      - name: Aktualisierten Snapshot zurueckschreiben
        run: |
          if [ -n "$(git status --porcelain snapshot.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add snapshot.json
            git commit -m "Update ranking snapshot"
            git push
          else
            echo "Kein Snapshot-Update noetig."
          fi
