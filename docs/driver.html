<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRCrating — Driver</title>
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <header class="site-header compact">
    <div class="wrap">
      <a class="back" href="index.html">‹ Back to ranking</a>
      <h1 id="d-name">…</h1>
      <p class="meta" id="d-sub"></p>
    </div>
  </header>

  <main class="wrap" id="content" hidden>
    <section class="cards" id="cards"></section>

    <section class="panel">
      <h2>Rating history</h2>
      <div class="chartbox">
        <canvas id="chart"></canvas>
      </div>
    </section>

    <section class="panel">
      <h2>Races <span class="dim" id="race-count"></span></h2>
      <div class="tablescroll">
        <table class="races">
          <thead>
            <tr><th>Date</th><th>Event</th><th>Tier</th><th class="col-num">Pos</th><th class="col-num">Pts</th><th class="col-num">DSR</th><th class="col-num">LPR</th></tr>
          </thead>
          <tbody id="races"></tbody>
        </table>
      </div>
    </section>
  </main>

  <p class="empty" id="notfound" hidden>Driver not found.</p>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="assets/driver.js"></script>
</body>
</html>
